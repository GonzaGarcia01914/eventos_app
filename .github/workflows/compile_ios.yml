name: Compile iOS Simulator Build

on:
  workflow_dispatch: # Esto te permite activar la compilación manualmente con un botón en GitHub

jobs:
  build_ios:
    runs-on: macos-latest # 👈 Aquí ocurre la magia: GitHub te presta una Mac virtual con Xcode
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      # Compilamos específicamente para Arquitectura de Simulador (x86_64/arm64) que es lo que pide Appetize
      - name: Build for Simulator
        run: flutter build ios --simulator --no-codesign

      # Comprimimos la carpeta .app en un archivo .zip (Formato requerido por Appetize)
      - name: Zip Build
        run: |
          cd build/ios/iphonesimulator
          zip -r ios_simulator_build.zip Runner.app

      # Subimos el archivo final a GitHub para que lo puedas descargar
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-app
          path: build/ios/iphonesimulator/ios_simulator_build.zip