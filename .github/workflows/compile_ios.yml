name: Flutter iOS Simulator Build for Appetize

on:
    
  workflow_dispatch:

  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build_ios_simulator:
    runs-on: macos-latest

    steps:
      # 1. Clonar el repositorio
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Configurar el entorno de Flutter
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # 3. Instalar dependencias del proyecto
      - name: Install Flutter dependencies
        run: flutter pub get

      # 4. Instalar CocoaPods
      - name: Install CocoaPods
        run: |
          cd ios
          pod install
          cd ..

      # 5. COMPILAR PARA SIMULADOR (Clave para Appetize)
      # Se usa '--simulator' para compilar la arquitectura x86_64/ARM64 de simulación
      - name: Build for iOS Simulator
        run: flutter build ios --simulator --debug

      # 6. EMPAQUETAR EL .APP EN UN .ZIP (Requisito de Appetize)
      # Appetize requiere que la carpeta 'Runner.app' esté dentro de un archivo zip
      - name: Zip Build for Appetize
        run: |
          cd build/ios/iphonesimulator
          zip -r ios_simulator_app.zip Runner.app

      # 7. Guardar el archivo ZIP en los artefactos de GitHub
      - name: Upload Zip Artifact
        uses: actions/upload-artifact@v4
        with:
          name: appetize-ios-build
          path: build/ios/iphonesimulator/ios_simulator_app.zip